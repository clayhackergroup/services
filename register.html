<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register &mdash; InstaFlow</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--primary);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .register-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
    }
    .register-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .register-header .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .register-header .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #0f3460 0%, #e94560 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .register-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .register-header p { font-size: 14px; color: var(--text-muted); }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--highlight); }
    .form-group input::placeholder { color: rgba(160,160,184,0.4); }
    .form-error { font-size: 12px; color: var(--highlight); margin-top: 4px; display: none; }
    .form-error.visible { display: block; }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0f3460 0%, #e94560 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(233,69,96,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(233,69,96,0.4); }
    .btn-submit.loading { opacity: 0.7; pointer-events: none; }
    .btn-submit .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .login-footer { text-align: center; margin-top: 20px; }
    .login-footer a { color: var(--text-muted); font-size: 13px; text-decoration: none; }
    .login-footer a:hover { color: var(--text); }
    .secure-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.15);
      padding: 6px 14px;
      border-radius: 100px;
    }
    @media (max-width: 480px) {
      .register-card { padding: 32px 20px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="register-card">
    <div class="register-header">
      <div class="logo">
        <div class="logo-icon">&#9889;</div>
        InstaFlow
      </div>
      <h1>Create Your Account</h1>
      <p>Register for your 30-day free trial of Instagram automation.</p>
      <div class="secure-badge">&#128274; End-to-end encrypted</div>
    </div>

    <form id="registerForm" autocomplete="off">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="John" required>
          <div class="form-error" id="firstNameError">First name is required.</div>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Doe" required>
          <div class="form-error" id="lastNameError">Last name is required.</div>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
        <div class="form-error" id="emailError">Please enter a valid email.</div>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
        <div class="form-error" id="phoneError">Please enter a valid phone number.</div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">&#8594; Register &amp; Get OTP</span>
        <span class="spinner"></span>
      </button>
    </form>

    <div class="login-footer">
      Already have an account? <a href="index.html">Back to home</a>
    </div>
  </div>

  <script src="register.js"></script>
</body>
</html>
